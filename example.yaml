# Learn a Marantec remote code with an ESP32 + CC1101 — no Flipper needed.
#
# Press your Marantec remote near the CC1101 and watch the logs for:
#   [I][marantec]: Learned code: 0x130CF7B95865A (CRC ok)
# Use that hex value wherever you need the code.

esphome:
  name: marantec-learner
  # Make the decoder header available to lambdas. Pull it into your config
  # directory (e.g. next to this YAML) or vendor it however you like.
  includes:
    - marantec.h

esp32:
  board: az-delivery-devkit-v4
  framework:
    type: arduino

logger:
api:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  clk_pin: GPIO18
  miso_pin: GPIO19
  mosi_pin: GPIO23

cc1101:
  id: transceiver
  cs_pin: GPIO5
  frequency: 868.35MHz

remote_receiver:
  id: rf_rx
  pin: GPIO33                 # CC1101 GDO2
  dump: raw                   # optional, for debugging
  tolerance: 25%
  filter: 250us
  idle: 15ms                  # above Marantec's ~10 ms inter-frame gap
  buffer_size: 6kb
  on_raw:
    then:
      - lambda: |-
          uint64_t code;
          if (esphome::marantec::decode(x, &code)) {
            ESP_LOGI("marantec", "Learned code: 0x%013llX (CRC ok)",
                     (unsigned long long) code);
          }
